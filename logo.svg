<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.7"/>
    </filter>
    <filter id="inner">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Controller body -->
  <g filter="url(#glow)">
    <path d="M65,32 Q38,32 30,58 L18,92 Q13,112 28,118 Q42,123 53,110 L62,94 L138,94 L147,110 Q158,123 172,118 Q187,112 182,92 L170,58 Q162,32 135,32 Z"
          fill="url(#body)"/>
    <!-- Shoulder ridge -->
    <path d="M65,32 Q62,18 76,15 L96,13 L104,13 L124,15 Q138,18 135,32 Z"
          fill="url(#top)"/>
  </g>

  <!-- Shoulder buttons -->
  <rect x="32" y="25" width="30" height="9" rx="4.5" fill="#6d28d9"/>
  <rect x="138" y="25" width="30" height="9" rx="4.5" fill="#6d28d9"/>

  <!-- D-pad (left) -->
  <rect x="53" y="52" width="9" height="28" rx="3" fill="rgba(255,255,255,0.88)"/>
  <rect x="42" y="63" width="31" height="9" rx="3" fill="rgba(255,255,255,0.88)"/>

  <!-- ABXY buttons (right) -->
  <circle cx="144" cy="54" r="9" fill="#fbbf24" filter="url(#inner)"/>
  <text x="144" y="58.5" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="Arial, sans-serif">Y</text>

  <circle cx="144" cy="81" r="9" fill="#34d399" filter="url(#inner)"/>
  <text x="144" y="85.5" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="Arial, sans-serif">A</text>

  <circle cx="128" cy="67" r="9" fill="#60a5fa" filter="url(#inner)"/>
  <text x="128" y="71.5" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="Arial, sans-serif">X</text>

  <circle cx="160" cy="67" r="9" fill="#f87171" filter="url(#inner)"/>
  <text x="160" y="71.5" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="Arial, sans-serif">B</text>

  <!-- Left analog stick -->
  <circle cx="83" cy="76" r="14" fill="rgba(0,0,0,0.4)"/>
  <circle cx="83" cy="76" r="10" fill="#4c1d95" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <circle cx="83" cy="76" r="4" fill="rgba(255,255,255,0.12)"/>

  <!-- Right analog stick -->
  <circle cx="117" cy="76" r="14" fill="rgba(0,0,0,0.4)"/>
  <circle cx="117" cy="76" r="10" fill="#4c1d95" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <circle cx="117" cy="76" r="4" fill="rgba(255,255,255,0.12)"/>

  <!-- Start / Select -->
  <rect x="88" y="54" width="9" height="5" rx="2.5" fill="rgba(255,255,255,0.45)"/>
  <rect x="103" y="54" width="9" height="5" rx="2.5" fill="rgba(255,255,255,0.45)"/>

  <!-- Home button -->
  <circle cx="100" cy="67" r="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="100" cy="67" r="2.5" fill="rgba(255,255,255,0.5)"/>
</svg>
